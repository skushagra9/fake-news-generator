server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static assets — long cache because Vite hashes filenames.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Reverse proxy /api -> backend service. We disable buffering so SSE
  # streams flush token-by-token to the browser instead of all-at-once.
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
  }

  # SPA fallback for client-side routes (/articles/:id etc).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
